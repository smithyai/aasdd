name: Update floating version tag

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  update-tag:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine current major version
        id: version
        shell: bash
        run: |
          # Find the latest vN tag (integer versions only, per METHODOLOGY.md)
          LATEST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)
          if [[ -z "$LATEST_TAG" ]]; then
            echo "No version tags found — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Float version tag to HEAD
        if: steps.version.outputs.skip == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" -m "Update $TAG to latest main"
          git push origin "$TAG" --force
